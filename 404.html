<!DOCTYPE html>
<html lang="zh_CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - {{ site.title }}</title>
  <link rel="stylesheet" href="/res/css/vue.css">
  <style>
    body { text-align: center; padding-top: 100px; }
    h1 { font-size: 60px; color: #42b983; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>页面不存在</p>
  <p><a href="/">返回首页</a></p>
  <script>
    // 兼容旧URL格式，将 .md 结尾的路径重定向
    (function() {
      var path = location.pathname;
      if (path.endsWith('.md') || path.endsWith('.md/')) {
        var newPath = path.replace(/\.md\/?$/, '/');
        location.replace(newPath);
      }
    })();
  </script>
</body>
</html>
