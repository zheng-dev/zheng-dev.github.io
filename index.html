<!DOCTYPE html>
<html lang="zh_CN">
<html>

<head>
  <title>春之韵</title>

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta charset="UTF-8" />

  <style>
    code {
      overflow: auto;
    }

    .markdown-section pre>code.lang-mermaid {
      display: none;
    }

    .markdown-section {
      padding: 30px 5px 4px 5px;
      max-width: 95%;
    }
  </style>
</head>

<body>
  <div id="app">Please wait...</div>
  <script>
    window.$docsify = {
      el: '#app',
      basePath: '/md/',
      relativePath: true,
      autoHeader: true,
      auto2top: true,
      routerMode: 'history', // default: 'hash'

      // loadSidebar: true,
      loadNavbar: '_navbar.md',
      homepage: '../README.md',

      mergeNavbar: true,
      repo: "https://github.com/zheng-dev/my_all_test0",
      plugins: [
        function (hook, vm) {
          var mermaidLoaded = false;
          hook.doneEach(function () {
            if (!document.querySelector('.mermaid')) return;
            if (mermaidLoaded) {
              mermaid.init(undefined, '.mermaid');
            } else {
              var s = document.createElement('script');
              s.src = '/res/js/mermaid.min.js';
              s.onload = function () {
                mermaidLoaded = true;
                mermaid.initialize({ startOnLoad: false });
                mermaid.init(undefined, '.mermaid');
              };
              document.body.appendChild(s);
            }
          });
        }
      ],
      markdown: {
        renderer: {
          code: function (code, lang) {
            var html = '';
            if (code.match(/^sequenceDiagram/) || code.match(/^graph/) || code.match(/^gantt/)) {
              html = '<div class="mermaid">' + code + '</div>';
            }
            var hl = Prism.highlight(code, Prism.languages[lang] || Prism.languages.markup);
            return html + '<pre v-pre data-lang="' + lang + '"><code class="lang-' + lang + '">' + hl + '</code></pre>';
          }
        }
      },
      // giscus: {
      //   repo: "zheng-dev/desk_time",
      //   repoId: "MDEwOlJlcG9zaXRvcnkxMTI4MTUwNTQ=",
      //   category: "General",
      //   categoryId: "DIC_kwDOBrlrzs4CfrfH",
      //   mapping: "pathname",
      //   reactionsEnabled: "0",
      //   strict: "1",
      //   emitMetadata: "1",
      //   inputPosition: "bottom",
      //   theme: "light",
      //   lang: "zh-CN",
      //   loading: "lazy"
      // },
    };
  </script>

  <link rel="stylesheet" href="/res/css/vue.css" />
  <script src="/res/js/docsify.js"></script>
  <script src="/res/js/prism-bash.js"></script>
  <script src="/res/js/prism-javascript.js"></script>
  <script src="/res/js/prism-erlang.js"></script>
</body>

</html>
