<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="/res/css/vue.css">
  <style>
    body { overflow: auto !important; height: auto; }
    body .app-nav { display: block !important; }
    .app-nav li.open ul { display: block; }
    .content {
      max-width: 95%;
      margin: 0 auto;
      padding: 30px 5px 4px 5px;
      padding-top: 60px;
      position: static;
    }
    .content h1:first-of-type {
      margin-top: 0;
    }
    .mermaid {
      text-align: center;
      margin: 1em 0;
    }
  </style>
</head>
<body>
  <nav class="app-nav">
    <ul>
      {% for item in site.data.navigation %}
        {% if item.children %}
          <li>{{ item.title }}
            <ul>
              {% for child in item.children %}
                <li><a href="{{ child.url }}">{{ child.title }}</a></li>
              {% endfor %}
            </ul>
          </li>
        {% else %}
          <li><a href="{{ item.url }}">{{ item.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>

  <section class="content markdown-section">
    {{ content }}
  </section>

  <script src="/res/js/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
  <script>
    (function() {
      document.querySelectorAll('.app-nav li').forEach(function(li) {
        li.addEventListener('click', function(e) {
          if (e.target.tagName === 'A') return;
          this.classList.toggle('open');
          document.querySelectorAll('.app-nav li.open').forEach(function(other) {
            if (other !== li) other.classList.remove('open');
          });
        });
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.app-nav')) {
          document.querySelectorAll('.app-nav li.open').forEach(function(li) {
            li.classList.remove('open');
          });
        }
      });

      function renderMermaid() {
        document.querySelectorAll('code.language-mermaid').forEach(function(el) {
          var pre = el.parentElement;
          if (!pre || pre.tagName !== 'PRE') return;
          var code = el.textContent;
          console.log('mermaid code:', code);
          var id = 'mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = id;
          pre.parentNode.replaceChild(container, pre);
          try {
            mermaid.mermaidAPI.render(id, code, function(svg) {
              container.innerHTML = svg;
            });
          } catch(e) {
            console.error('mermaid render error:', e);
            container.textContent = 'mermaid error: ' + e.message;
          }
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderMermaid);
      } else {
        renderMermaid();
      }
    })();
  </script>
</body>
</html>
