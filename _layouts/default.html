<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="/res/css/vue.css">
  <style>
    body { overflow: auto !important; height: auto; }
    body .app-nav { display: block !important; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .app-nav li.open ul { display: block; }
    .content {
      max-width: 95%;
      margin: 0 auto;
      padding: 30px 5px 4px 5px;
      padding-top: 60px;
      position: static;
    }
    .content h1:first-of-type {
      margin-top: 0;
    }
    .mermaid {
      text-align: center;
      margin: 1em 0;
    }
  </style>
</head>
<body>
  <nav class="app-nav">
    <ul>
      {% for item in site.data.navigation %}
        {% if item.children %}
          <li>{{ item.title }}
            <ul>
              {% for child in item.children %}
                <li><a href="{{ child.url }}">{{ child.title }}</a></li>
              {% endfor %}
            </ul>
          </li>
        {% else %}
          <li><a href="{{ item.url }}">{{ item.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>

  <section class="content markdown-section">
    {{ content }}
  </section>

  <script>
    (function() {
      function hasMermaidContent() {
        return document.querySelectorAll('code.language-mermaid, .mermaid').length > 0;
      }

      function loadMermaid(callback) {
        var script = document.createElement('script');
        script.src = '/res/js/mermaid.min.js';
        script.onload = function() {
          mermaid.initialize({ startOnLoad: false });
          if (callback) callback();
        };
        document.head.appendChild(script);
      }

      function renderMermaid() {
        document.querySelectorAll('code.language-mermaid').forEach(function(el) {
          var pre = el.parentElement;
          if (!pre || pre.tagName !== 'PRE') return;
          var div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = el.textContent;
          pre.parentNode.replaceChild(div, pre);
        });
        var mermaidDivs = document.querySelectorAll('.mermaid');
        if (mermaidDivs.length) {
          mermaid.init(undefined, mermaidDivs);
        }
      }

      function init() {
        document.querySelectorAll('.app-nav li').forEach(function(li) {
          li.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            this.classList.toggle('open');
            document.querySelectorAll('.app-nav li.open').forEach(function(other) {
              if (other !== li) other.classList.remove('open');
            });
          });
        });
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.app-nav')) {
            document.querySelectorAll('.app-nav li.open').forEach(function(li) {
              li.classList.remove('open');
            });
          }
        });

        if (hasMermaidContent()) {
          loadMermaid(renderMermaid);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
